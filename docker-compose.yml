services:
  neo4j:
    image: neo4j:5.26.28-community
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_conf:/conf
      - neo4j_plugins:/plugins
    environment:
      - NEO4J_AUTH=neo4j/${PASSWORD:-neo4j}
    ports:
      - "7474:7474"
      - "7687:7687"
    restart: always

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_conf:
  neo4j_plugins: